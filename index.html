// Buying an option converts it into a wardrobe item and fills its gap.
// Triggered by the "add to wardrobe" button OR by setting the option's status to "Bought".
function considerToWardrobe(id) {
  const c = find("consider", id); if (!c) return;
  const prevStatus = c.status;
  // Already converted (item still exists)? Just ensure it's marked bought — never duplicate.
  if (c.itemId && state.items.find(i => i.id === c.itemId)) {
    if (c.status !== "Bought") { c.status = "Bought"; save(); refresh(); }
    return;
  }
  const itemId = uid();
  state.items.push({ id: itemId, name: c.name, category: c.category, colour: "", brand: c.brand || "", season: "All-season", status: "keep", quantity: 1, url: c.url || "", image: c.image || "", notes: c.notes || "", createdAt: Date.now() });
  c.itemId = itemId;
  c.status = "Bought";
  let filledGap = null;
  if (c.gapId) { const g = find("need", c.gapId); if (g && !g.done) { g.done = true; filledGap = g; } }
  save();
  refresh();
  showToast("Added to your wardrobe" + (filledGap ? " · gap filled ✓" : ""), "Undo", () => {
    state.items = state.items.filter(i => i.id !== itemId);
    c.itemId = ""; c.status = prevStatus;
    if (filledGap) filledGap.done = false;
    save(); refresh();
  });
}
// Move an item between lifecycle stages (keep / donate / sell / gone) with undo.
function moveItem(id, status, msg) {
  const i = find("item", id); if (!i) return;
  const prev = i.status || "keep";
  const prevOutcome = i.outcome;
  i.status = status;
  if (status !== "gone") delete i.outcome;
  save(); refresh();
  showToast(msg, "Undo", () => { i.status = prev; if (prevOutcome) i.outcome = prevOutcome; else delete i.outcome; save(); refresh(); });
}
function decommission(id) {
  const i = find("item", id); if (!i) return;
  const prev = i.status || "keep";
  i.outcome = i.status === "sell" ? "sold" : i.status === "donate" ? "donated" : "retired";
  i.status = "gone";
  save(); refresh();
  showToast("Decommissioned — “" + (i.name || "") + "”", "Undo", () => { i.status = prev; delete i.outcome; save(); refresh(); });
}
function arrFor(type) { return type === "item" ? state.items : type === "need" ? state.needs : state.consider; }
function deleteRec(type, id) {
  const arr = arrFor(type);
  const idx = arr.findIndex(x => x.id === id);
  if (idx === -1) return;
  const rec = arr[idx];
  arr.splice(idx, 1);
  save(); refresh();
  const label = { item: "Item", need: "Gap", consider: "Option" }[type];
  showToast(label + " deleted — “" + (rec.name || "") + "”", "Undo", () => {
    const a = arrFor(type);
    a.splice(Math.min(idx, a.length), 0, rec);
    save(); refresh();
  });
}

/* Toast with optional undo action */
let toastTimer = null;
function showToast(msg, actionLabel, actionFn) {
  const t = document.getElementById("toast");
  if (!t) return;
  if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
  t.innerHTML = "<span>" + esc(msg) + "</span>" + (actionLabel ? '<button class="toast-btn" id="toast-action" type="button">' + esc(actionLabel) + "</button>" : "");
  t.classList.add("show");
  if (actionLabel) document.getElementById("toast-action").onclick = () => { hideToast(); if (actionFn) actionFn(); };
  toastTimer = setTimeout(hideToast, 6000);
}
function hideToast() {
  const t = document.getElementById("toast");
  if (t) t.classList.remove("show");
  if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
}

/* small DOM utils */
function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ""; }
function setVal(id, v) { const el = document.getElementById(id); if (el) el.value = v; }
function focus(id) { const el = document.getElementById(id); if (el) el.focus(); }

/* ---------- Data: export / import / reset ---------- */
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "wardrobe-backup-" + new Date().toISOString().slice(0, 10) + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}
function importData() { document.getElementById("file-input").click(); }
function handleImport(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!confirm("Import this backup? It will replace your current wardrobe data.")) return;
      state = normalize(parsed);
      save();
      document.getElementById("cur-input").value = state.settings.currency || "£";
      renderAll();
    } catch (err) { alert("Couldn't read that file — is it a valid wardrobe backup?"); }
  };
  reader.readAsText(file);
}
function resetData() {
  if (!confirm("Reset everything? This permanently clears all items, needs and options on this device.")) return;
  if (!confirm("Are you sure? This can't be undone (export a backup first if unsure).")) return;
  state = blank();
  save();
  renderAll();
}

/* ---------- Event wiring (delegated) ---------- */
document.addEventListener("submit", e => {
  const f = e.target;
  if (f.id === "form-inv") { e.preventDefault(); addInv(); }
  else if (f.id === "form-wish") { e.preventDefault(); addOption(); }
  else if (f.id === "form-edit") { e.preventDefault(); saveEditor(f); }
  else if (f.id === "form-cat") {
    e.preventDefault();
    const inp = document.getElementById("cat-new");
    const v = (inp.value || "").trim();
    if (v) {
      if (addCustomCategory(v)) { renderMain(); renderCatManager(); }
      else showToast("“" + v + "” already exists", null);
    }
    inp.value = ""; inp.focus();
  }
});

document.addEventListener("click", e => {
  // Dismiss the popover on any click outside it (the offload button reopens a fresh one).
  if (!e.target.closest("#popover")) closePopover();
  // Lightbox: clicking it closes; clicking any thumbnail opens it big.
  if (e.target.closest("#lightbox")) { closeLightbox(); return; }
  const thumbEl = e.target.closest(".rthumb, .thumb-preview, .icard-img");
  if (thumbEl) { const im = thumbEl.querySelector("img"); if (im && im.getAttribute("src")) { openLightbox(im.getAttribute("src")); return; } }
  // Close the modal only when the backdrop itself is clicked (not children that bubble up).
  if (e.target.classList && e.target.classList.contains("modal-backdrop")) { closeEditor(); return; }

  const tab = e.target.closest(".tab");
  if (tab) { ui.tab = tab.dataset.tab; renderMain(); return; }

  // segmented status toggle inside editor
  const segBtn = e.target.closest("#e-status button");
  if (segBtn) { segBtn.parentElement.querySelectorAll("button").forEach(b => b.classList.remove("on")); segBtn.classList.add("on"); return; }

  // inventory add-type toggle (Item / Gap)
  const iat = e.target.closest("#inv-addtype button");
  if (iat) { if (ui.inv.addType !== iat.dataset.t) { ui.inv.addType = iat.dataset.t; renderInventory(); } return; }

  const actEl = e.target.closest("[data-action]");
  if (!actEl) {
    // close the settings menu only when clicking outside it (not on the menu's own fields/buttons)
    if (!e.target.closest("#menu") && !e.target.closest("#menu-toggle")) document.getElementById("menu").classList.remove("open");
    return;
  }
  const action = actEl.dataset.action;
  const id = actEl.dataset.id;
  const type = actEl.dataset.type;

  switch (action) {
    case "filter-cat": ui.inv.cat = (ui.inv.cat === actEl.dataset.cat) ? "" : actEl.dataset.cat; fillInventory(); break;
    case "goto-cat": ui.tab = "inventory"; ui.inv.cat = actEl.dataset.cat; ui.inv.q = ""; ui.inv.status = ""; renderMain(); window.scrollTo(0, 0); break;
    case "toggle-showneeds": ui.inv.showNeeds = !ui.inv.showNeeds; renderInventory(); break;
    case "set-view": {
      const scope = actEl.dataset.scope || "inv";
      const target = { inv: ui.inv, wish: ui.wishlist, sell: ui.selling, gone: ui.gone }[scope] || ui.inv;
      target.view = actEl.dataset.view;
      saveUi();
      if (scope === "wish") renderWishlist();
      else if (scope === "sell") renderSelling();
      else if (scope === "gone") renderGone();
      else renderInventory();
      break;
    }
    case "wish-filter-cat": ui.wishlist.cat = (ui.wishlist.cat === actEl.dataset.cat) ? "" : actEl.dataset.cat; fillWishlist(); break;
    case "toggle-showclosed": ui.wishlist.showClosed = !ui.wishlist.showClosed; renderWishlist(); break;
    case "rm-cat": removeCustomCategory(actEl.dataset.cat); break;
    case "rename-cat": renameCustomCategory(actEl.dataset.cat); break;
    case "fetch-link": fetchLinkInto(actEl.dataset.for); break;
    case "upload-img": pickImageFor(actEl.dataset.for); break;
    case "to-selling": moveItem(id, "donate", "Moved to Selling/Donating"); break;
    case "offload-menu": openOffloadMenu(id, actEl); break;
    case "offload-as": closePopover(); moveItem(id, actEl.dataset.as, "Moved to Selling/Donating (" + (actEl.dataset.as === "sell" ? "for sale" : "to donate") + ")"); break;
    case "tie-gap": openTieGapMenu(id, actEl); break;
    case "tie-gap-to": tieOptionToGap(id, actEl.dataset.gap); break;
    case "tie-gap-new": tieOptionToNewGap(id); break;
    case "open-links": openWishlistLinks(actEl.dataset.scope, actEl.dataset.key); break;
    case "sell-toggle": { const i = find("item", id); if (i) { i.status = i.status === "sell" ? "donate" : "sell"; save(); refresh(); } break; }
    case "decommission": decommission(id); break;
    case "restore-keep": moveItem(id, "keep", "Back in your wardrobe"); break;
    case "toggle-need": { const n = find("need", id); if (n) { n.done = !n.done; save(); refresh(); } break; }
    case "gap-options": gapToWishlist(id); break;
    case "add-option-for": addOptionFor(id); break;
    case "fill-gap": fillGap(id); break;
    case "consider-to-wardrobe": considerToWardrobe(id); break;
    case "edit": openEditor(type, id); break;
    case "delete": deleteRec(type, id); break;
    case "dismiss-intro": state.onboarded = true; save(); renderInventory(); break;
    case "modal-cancel": closeEditor(); break;
    case "export": exportData(); document.getElementById("menu").classList.remove("open"); break;
    case "import": importData(); document.getElementById("menu").classList.remove("open"); break;
    case "reset": resetData(); document.getElementById("menu").classList.remove("open"); break;
  }
});

document.addEventListener("change", e => {
  const t = e.target;
  if ((t.id === "inv-cat" || t.id === "wish-cat" || t.id === "e-cat") && t.value === "__new__") { handleNewCategory(t); return; }
  if (t.id === "inv-status") { ui.inv.status = t.value; fillInventory(); }
  else if (t.id === "inv-sort") { ui.inv.sort = t.value; fillInventory(); }
  else if (t.id === "wish-sort") { ui.wishlist.sort = t.value; fillWishlist(); }
  else if (t.id === "wish-gap") { if (t.value === "__newgap__") { handleNewGap(); return; } ui.wishlist.addGap = t.value; const wrap = document.getElementById("wish-cat-wrap"); if (wrap) wrap.style.display = t.value ? "none" : ""; }
  else if (t.classList && t.classList.contains("sale-price")) { const i = find("item", t.dataset.id); if (i) { i.salePrice = parsePrice(t.value); save(); renderStats(); renderSelling(); } }
  else if (t.dataset && t.dataset.action === "consider-status") {
    const c = find("consider", t.dataset.id);
    if (c) {
      if (t.value === "Bought") { considerToWardrobe(c.id); }   // marking Bought converts it to a wardrobe item
      else { c.status = t.value; save(); refresh(); }
    }
  }
  else if (t.id === "file-input" && t.files && t.files[0]) { handleImport(t.files[0]); t.value = ""; }
  else if (t.id === "cur-input") { state.settings.currency = t.value.trim() || "£"; save(); refresh(); }
});

document.addEventListener("input", e => {
  if (e.target.id === "inv-q") { ui.inv.q = e.target.value; fillInventory(); }
  else if (e.target.id === "wish-q") { ui.wishlist.q = e.target.value; fillWishlist(); }
  else if (e.target.id === "inv-link") { pendingImg.inv = ""; renderThumbPreview("inv"); }
  else if (e.target.id === "wish-link") { pendingImg.wish = ""; renderThumbPreview("wish"); }
  else if (e.target.id === "e-image") { renderEditPreview(); }
});

// A pulled/pasted image that fails to load falls back gracefully (don't show a broken icon).
document.addEventListener("error", e => {
  const t = e.target;
  if (t && t.tagName === "IMG") { const w = t.closest(".rthumb"); if (w) w.classList.add("broken"); }
}, true);

// Paste an image from the clipboard straight into the active add form / editor.
document.addEventListener("paste", e => {
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (let i = 0; i < items.length; i++) {
    if (items[i].type && items[i].type.indexOf("image") === 0) {
      const file = items[i].getAsFile();
      if (!file) return;
      const target = document.querySelector(".modal-backdrop") ? "e" : (ui.tab === "inventory" ? "inv" : "wish");
      if (target === "inv" && ui.inv.addType === "gap") { showToast("Switch the add toggle to ‘Item’ to attach an image", null); return; }
      e.preventDefault();
      handleImageFile(file, target);
      return;
    }
  }
});

document.getElementById("menu-toggle").addEventListener("click", e => {
  e.stopPropagation();
  const m = document.getElementById("menu");
  m.classList.toggle("open");
  if (m.classList.contains("open")) renderCatManager();
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape") { closePopover(); closeLightbox(); closeEditor(); document.getElementById("menu").classList.remove("open"); hideToast(); return; }
  if (e.key === "Enter" && (e.target.id === "inv-link" || e.target.id === "wish-link")) { e.preventDefault(); fetchLinkInto(e.target.id === "inv-link" ? "inv" : "wish"); return; }
  const tag = (e.target.tagName || "").toLowerCase();
  if (tag === "input" || tag === "textarea" || tag === "select" || e.target.isContentEditable) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (document.querySelector(".modal-backdrop")) return; // don't fire shortcuts while editing
  if (e.key === "/") { e.preventDefault(); focus(ui.tab === "inventory" ? "inv-q" : "wish-q"); }
  else if (e.key === "n" || e.key === "N") { e.preventDefault(); focus(ui.tab === "inventory" ? "inv-name" : "wish-name"); }
  else if (e.key === "1") { ui.tab = "inventory"; renderMain(); window.scrollTo(0, 0); }
  else if (e.key === "2") { ui.tab = "wishlist"; renderMain(); window.scrollTo(0, 0); }
  else if (e.key === "3") { ui.tab = "selling"; renderMain(); window.scrollTo(0, 0); }
  else if (e.key === "4") { ui.tab = "gone"; renderMain(); window.scrollTo(0, 0); }
});

/* ---------- Drag-to-reorder (pointer-based; works with mouse & touch) ---------- */
let dragCtx = null;
function sortableIds(container) {
  return [...container.children].filter(c => c.matches && c.matches("[data-sortable]")).map(c => c.dataset.id);
}
document.addEventListener("pointerdown", e => {
  const handle = e.target.closest("[data-drag]");
  if (!handle) return;
  const item = handle.closest("[data-sortable]");
  const container = item && item.closest(".sortable");
  if (!item || !container || item.parentElement !== container) return;
  e.preventDefault();
  dragCtx = { item, container, kind: container.dataset.sortkind, orig: sortableIds(container).join(",") };
  item.classList.add("dragging");
  document.body.classList.add("dragging-active");
});
document.addEventListener("pointermove", e => {
  if (!dragCtx) return;
  e.preventDefault();
  const { item, container } = dragCtx;
  const sibs = [...container.children].filter(c => c !== item && c.matches && c.matches("[data-sortable]"));
  let before = null;
  for (const s of sibs) { const r = s.getBoundingClientRect(); if (e.clientY < r.top + r.height / 2) { before = s; break; } }
  if (before) { if (item.nextElementSibling !== before) container.insertBefore(item, before); }
  else if (container.lastElementChild !== item) container.appendChild(item);
});
function endDrag() {
  if (!dragCtx) return;
  const { item, container, kind, orig } = dragCtx;
  item.classList.remove("dragging");
  document.body.classList.remove("dragging-active");
  const ids = sortableIds(container);
  dragCtx = null;
  if (ids.join(",") === orig) return;        // no actual change
  if (kind === "category") commitCategoryOrder(ids);
  else commitItemOrder(ids);
}
document.addEventListener("pointerup", endDrag);
document.addEventListener("pointercancel", endDrag);
function commitCategoryOrder(ids) {
  state.customCategories = ids.slice();
  save(); renderCatManager(); renderMain();
}
function commitItemOrder(ids) {
  const idset = new Set(ids);
  const ordered = ids.map(id => state.items.find(it => it.id === id)).filter(Boolean);
  let k = 0;
  state.items = state.items.map(it => idset.has(it.id) ? ordered[k++] : it);
  // dragging defines a custom arrangement — switch the sort to it so it sticks and stays visible
  ui.inv.sort = "custom";
  const sortSel = document.getElementById("inv-sort");
  if (sortSel) sortSel.value = "custom";
  save(); renderStats(); fillInventory();
}

/* ---------- Init ---------- */
document.getElementById("cur-input").value = state.settings.currency || "£";
renderCatManager();
renderAll();
</script>
